<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React</title>
  </head>
  <body>
    <header id="header">
      <h1>Shiwali is here!</h1>
    </header>
    <h1>Hello - Top of Root</h1>
    <div id="root">
      <h1>Shiwali is here!</h1>
    </div>
    <h1>Hello - Below of Root</h1>

    <script type="module">
      // Importing React and ReactDOM from node_modules instead of CDN <script> tags
      import React from "react";
      import ReactDOM from "react-dom/client";

      const header = ReactDOM.createRoot(document.getElementById("header"));
      header.render(React.createElement("h1", {}, "Hello from React!"));
    </script>

  </body>
</html>
