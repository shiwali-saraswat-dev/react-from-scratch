<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- This file i.e. react.development.js contains the React Code which is plain JS -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

    <!-- This file i.e. react-dom.development.js is useful for DOM operations or use to modify the DOM -->
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script>
    /**
     * React.createElement() => Object => HTML Element (render)
     *
     * React.createElement() returns a plain JS object (a "React Element") —
     *  a virtual representation of the UI, not a real DOM node.
     * ReactDOM's render()/root.render() then converts that object into
     *  an actual HTML element and inserts it into the real DOM.
     */

      const heading = React.createElement("h1", {}, "Hello World from React!");
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(heading);
    </script>

  </body>
</html>
